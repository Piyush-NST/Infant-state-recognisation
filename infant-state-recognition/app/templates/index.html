<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Infant State Recognition</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f4f7f6; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .container { background: white; padding: 2rem; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); width: 100%; max-width: 500px; text-align: center; }
        h1 { color: #333; margin-bottom: 5px; }
        p { color: #666; margin-bottom: 20px; }
        .upload-area { border: 2px dashed #4a90e2; border-radius: 8px; padding: 40px; margin-bottom: 20px; background: #f8fbff; cursor: pointer; transition: 0.3s; }
        .upload-area:hover { background: #e8f1fb; }
        input[type="file"] { display: none; }
        .btn { background: #4a90e2; color: white; border: none; padding: 12px 24px; border-radius: 6px; font-size: 16px; cursor: pointer; transition: 0.3s; width: 100%; font-weight: bold; }
        .btn:hover { background: #357abd; }
        .result { margin-top: 20px; padding: 15px; border-radius: 8px; display: none; font-size: 18px; }
        .success { background: #d4edda; color: #155724; border: 1px solid #c3e6cb; }
        .error { background: #f8d7da; color: #721c24; border: 1px solid #f5c6cb; }
        #file-name { margin-top: 10px; color: #555; font-style: italic; }
        .loader { border: 4px solid #f3f3f3; border-top: 4px solid #4a90e2; border-radius: 50%; width: 30px; height: 30px; animation: spin 1s linear infinite; margin: 20px auto; display: none; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <div class="container">
        <h1>Infant State Recognition</h1>
        <p>Upload an audio file (.wav) to predict the infant's state.</p>
        
        <form id="upload-form">
            <label for="audio-upload" class="upload-area" id="drop-zone">
                <div style="font-size: 40px; margin-bottom: 10px;">🎙️</div>
                <div>Click to browse or drag & drop audio file</div>
                <div id="file-name"></div>
            </label>
            <input type="file" id="audio-upload" name="file" accept="audio/wav" required>
            
            <button type="submit" class="btn">Analyze Audio</button>
        </form>
        
        <div class="loader" id="loader"></div>
        <div class="result" id="result-box"></div>
    </div>

    <script>
        const fileInput = document.getElementById('audio-upload');
        const fileNameDisplay = document.getElementById('file-name');
        const form = document.getElementById('upload-form');
        const resultBox = document.getElementById('result-box');
        const loader = document.getElementById('loader');

        fileInput.addEventListener('change', function() {
            if (this.files && this.files[0]) {
                fileNameDisplay.textContent = this.files[0].name;
            } else {
                fileNameDisplay.textContent = '';
            }
        });

        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            
            if (!fileInput.files[0]) return;

            const formData = new FormData();
            formData.append('file', fileInput.files[0]);

            // UI updating
            resultBox.style.display = 'none';
            resultBox.className = 'result';
            loader.style.display = 'block';

            try {
                const response = await fetch('/predict', {
                    method: 'POST',
                    body: formData
                });
                
                const data = await response.json();
                loader.style.display = 'none';
                
                resultBox.style.display = 'block';
                if (response.ok) {
                    resultBox.classList.add('success');
                    resultBox.innerHTML = `<strong>Prediction:</strong> ${data.prediction.toUpperCase()}<br><small>Confidence: ${data.confidence}</small>`;
                } else {
                    resultBox.classList.add('error');
                    resultBox.textContent = `Error: ${data.error}`;
                }
            } catch (err) {
                loader.style.display = 'none';
                resultBox.style.display = 'block';
                resultBox.classList.add('error');
                resultBox.textContent = 'Failed to connect to the server.';
            }
        });
    </script>
</body>
</html>
